name: Sync Medium Posts

on:
  schedule:
    - cron: '0 0 */3 * *'  # every 3 days at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Medium posts
        run: node scripts/sync-posts.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/posts.ts
          git diff --cached --quiet || (git commit -m "chore: sync medium posts" && git push)
